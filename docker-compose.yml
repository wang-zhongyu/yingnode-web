services:
  yingnode:
    build: .
    container_name: yingnode
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/yingnode.db
      - WIFI_INTERFACE=${WIFI_INTERFACE:-wlan0}
      - HOTSPOT_SSID=${HOTSPOT_SSID:-yingnode}
      - HOTSPOT_IP=${HOTSPOT_IP:-172.16.42.1}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://172.16.42.1:3000}
    volumes:
      - yingnode-data:/data
      - /var/run/dbus:/var/run/dbus:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

volumes:
  yingnode-data:

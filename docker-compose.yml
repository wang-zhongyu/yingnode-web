services:
  postgres:
    image: postgres:16-alpine
    container_name: yingnode-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: yingnode
      POSTGRES_USER: yingnode
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yingnode}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yingnode"]
      interval: 5s
      timeout: 3s
      retries: 5

  yingnode:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: yingnode
    network_mode: host
    privileged: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://yingnode:${DB_PASSWORD:-yingnode}@localhost:5432/yingnode
      - WIFI_INTERFACE=${WIFI_INTERFACE:-wlan0}
      - HOTSPOT_SSID=${HOTSPOT_SSID:-yingnode}
      - HOTSPOT_IP=${HOTSPOT_IP:-172.16.42.1}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://172.16.42.1:3000}
      - TERMINAL_TOKEN=${TERMINAL_TOKEN:-yingnode-terminal}
    volumes:
      - /var/run/dbus:/var/run/dbus:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

volumes:
  postgres-data:
